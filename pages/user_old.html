<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User — {{HOSTNAME}}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #111;
            color: #eee;
        }
        .card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 24px;
            border: 1px solid #333;
        }
        .field { margin-bottom: 12px; }
        .label { color: #888; font-size: 12px; text-transform: uppercase; }
        .value { font-size: 16px; }
        .error { color: #e74c3c; }
        button, a.button {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .logout { background: #333; color: #eee; }
        .login { background: #5865F2; color: #fff; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="heading">Loading…</h1>
        <div id="user-info" style="display:none">
            <div class="field"><div class="label">Username</div><div class="value" id="username"></div></div>
            <div class="field"><div class="label">Provider</div><div class="value" id="provider"></div></div>
            <div class="field"><div class="label">Admin</div><div class="value" id="admin"></div></div>
            <br>
            <a href="/auth/logout" class="button logout">Logout</a>
        </div>
        <div id="not-logged-in" style="display:none">
            <p>You are not logged in.</p>
            <a href="/auth/login/pocketid" class="button login">Login with Pocket ID</a>
            <a href="/auth/login/discord" class="button login" style="background:#5865F2">Login with Discord</a>
        </div>
        <div id="error" class="error" style="display:none"></div>
    </div>

    <script>
        fetch("/auth/me")
            .then(r => r.json())
            .then(user => {
                if (user.error) {
                    document.getElementById("not-logged-in").style.display = "block";
                    document.getElementById("heading").textContent = "Guest";
                } else {
                    document.getElementById("user-info").style.display = "block";
                    document.getElementById("heading").textContent = user.username;
                    document.getElementById("username").textContent = user.username;
                    document.getElementById("provider").textContent = user.primary_provider;
                    document.getElementById("admin").textContent = user.is_admin ? "Yes" : "No";
                }
            })
            .catch(() => {
                document.getElementById("not-logged-in").style.display = "block";
                document.getElementById("heading").textContent = "Guest";
            });
    </script>
</body>
</html>
