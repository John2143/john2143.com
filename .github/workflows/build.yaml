name: server

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  registry: ghcr.io/john2143
  repo: john2143.com

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Docker login
      run: |
        echo "${{ secrets.PAT_PACKAGES }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: "${{ env.registry }}/${{ env.repo }}:${{ github.run_number }}"
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image tag output
      id: meta
      run: echo "version=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  update-dev:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: development
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 2143-Labs/2143-k8s
        ssh-key: ${{ secrets.DEPLOY_KEY_2143_K8S }}

    - name: Update dev overlay image tag
      run: |
        sed -i 's/newTag: "[0-9]\+"/newTag: "${{ needs.build.outputs.image_tag }}"/' overlays/dev/kustomization.yaml
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --quiet && echo "No changes" || (git commit -am "dev: bump john2143.com to ${{ needs.build.outputs.image_tag }}" && git push)

  update-prod:
    needs: [build, update-dev]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 2143-Labs/2143-k8s
        ssh-key: ${{ secrets.DEPLOY_KEY_2143_K8S }}

    - name: Update prod overlay image tag
      run: |
        sed -i 's/newTag: "[0-9]\+"/newTag: "${{ needs.build.outputs.image_tag }}"/' overlays/prod/kustomization.yaml
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --quiet && echo "No changes" || (git commit -am "prod: bump john2143.com to ${{ needs.build.outputs.image_tag }}" && git push)
