name: server

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  registry: ghcr.io/john2143
  repo: john2143.com

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Docker login
      run: |
        echo "${{ secrets.PAT_PACKAGES }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: "${{ env.registry }}/${{ env.repo }}:${{ github.run_number }}"
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push worker
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.worker
        push: true
        tags: "${{ env.registry }}/${{ env.repo }}-worker:${{ github.run_number }}"
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image tag output
      id: meta
      run: echo "version=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  update-dev:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: development
    env:
      NEW_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 2143-Labs/2143-k8s
        ssh-key: ${{ secrets.DEPLOY_KEY_2143_K8S }}

    - name: Install kustomize
      run: |
        curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin

    - name: Update dev overlay image tag
      run: |
        cd overlays/dev
        kustomize edit set image imagehost:latest=ghcr.io/john2143/john2143.com:${{ env.NEW_TAG }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --quiet && echo "No changes" || (git commit -am "dev: bump john2143.com to ${{ env.NEW_TAG }}" && git push)

  update-prod:
    needs: [build, update-dev]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ !contains(github.event.head_commit.message, '[direct-prod]') && 'production' || '' }}
    env:
      NEW_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 2143-Labs/2143-k8s
        ssh-key: ${{ secrets.DEPLOY_KEY_2143_K8S }}

    - name: Install kustomize
      run: |
        curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin

    - name: Update prod overlay image tag
      run: |
        cd overlays/prod
        kustomize edit set image imagehost:latest=ghcr.io/john2143/john2143.com:${{ env.NEW_TAG }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --quiet && echo "No changes" || (git commit -am "prod: bump john2143.com to ${{ env.NEW_TAG }}" && git push)

  update-argo:
    needs: [build, update-prod]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ !contains(github.event.head_commit.message, '[direct-prod]') && 'production' || '' }}
    env:
      NEW_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 2143-Labs/argo
        ssh-key: ${{ secrets.DEPLOY_KEY_ARGO }}

    - name: Update image tags in deployment YAMLs
      run: |
        sed -i "s|\(ghcr\.io/john2143/john2143\.com:\)[0-9]*|\1${{ env.NEW_TAG }}|g" workloads/imageserver/deployment.yaml
        sed -i "s|\(ghcr\.io/john2143/john2143\.com-worker:\)[0-9]*|\1${{ env.NEW_TAG }}|g" workloads/john2143-worker/deployment.yaml
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --quiet && echo "No changes" || (git commit -am "bump john2143.com images to ${{ env.NEW_TAG }}" && git push)
